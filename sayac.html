<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bizim Zamanımız ❤️</title>

<style>

body{
background:#ff6b81;
text-align:center;
font-family:Arial;
color:white;
overflow:hidden;
}

h1{
margin-top:60px;
font-size:40px;
}

h2{
font-size:28px;
}

#sayac{
font-size:35px;
margin-top:30px;
line-height:1.8;
}

/* FOTOĞRAF */

.foto{
width:260px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* FOTOĞRAF ÇERÇEVESİ */

.fotoKutu{
position:relative;
display:inline-block;
margin-top:30px;
}

/* DÖNEN KALP */

.donenKalp{
position:absolute;
width:300px;
height:300px;
top:-20px;
left:-20px;
border-radius:50%;
animation:don 10s linear infinite;
}

.donenKalp span{
position:absolute;
font-size:20px;
}

.donenKalp span:nth-child(1){top:0; left:50%;}
.donenKalp span:nth-child(2){top:20%; left:85%;}
.donenKalp span:nth-child(3){top:60%; left:90%;}
.donenKalp span:nth-child(4){top:90%; left:50%;}
.donenKalp span:nth-child(5){top:60%; left:5%;}
.donenKalp span:nth-child(6){top:20%; left:10%;}

@keyframes don{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* UÇAN KALPLER */

.kalp{
position:fixed;
bottom:-50px;
font-size:25px;
animation:yukari 6s linear infinite;
}

@keyframes yukari{
0%{transform:translateY(0); opacity:1;}
100%{transform:translateY(-110vh); opacity:0;}
}

/* PATLAMA */

.patlama{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
opacity:1;
animation:patla 1s ease-out forwards;
}

@keyframes patla{
0%{transform:translate(-50%,-50%) scale(0); opacity:1;}
50%{transform:translate(-50%,-50%) scale(1.5); opacity:1;}
100%{transform:translate(-50%,-50%) scale(1); opacity:0;}
}

</style>
</head>

<body>

<h1>A ❤️ E</h1>
<h2>20 Şubat 2026'dan beri birlikteyiz 💞</h2>

<p>Seninle geçirdiğim her gün bana hayatın ne kadar güzel olduğunu hatırlatıyor.</p>
<p>Her saniye seninle daha da özel oluyor.</p>

<div id="sayac"></div>

<p>Benim en güzel anım ❤️</p>

<div class="fotoKutu">

<div class="donenKalp">
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
</div>

<img src="foto.jpg" class="foto">

</div>

<script>

var baslangic = new Date("2026-02-20 00:00:00")

function guncelle(){

var simdi = new Date()
var fark = simdi - baslangic

var gun = Math.floor(fark / (1000*60*60*24))
var saat = Math.floor((fark / (1000*60*60)) % 24)
var dakika = Math.floor((fark / (1000*60)) % 60)
var saniye = Math.floor((fark / 1000) % 60)

document.getElementById("sayac").innerHTML =
gun + " Gün ❤️ <br>" +
saat + " Saat ⏰ <br>" +
dakika + " Dakika ⏳ <br>" +
saniye + " Saniye 💞"

}

setInterval(guncelle,1000)

function kalpOlustur(){

var kalp = document.createElement("div")
kalp.classList.add("kalp")

kalp.innerHTML="A❤️E"

kalp.style.left = Math.random()*100 + "vw"
kalp.style.fontSize = (20 + Math.random()*30) + "px"

document.body.appendChild(kalp)

setTimeout(()=>{
kalp.remove()
},6000)

}

setInterval(kalpOlustur,300)

function patlama(){

for(let i=0;i<10;i++){

var p = document.createElement("div")
p.classList.add("patlama")

p.innerHTML="❤️"

p.style.fontSize = (30 + Math.random()*40) + "px"
p.style.left = (50 + (Math.random()-0.5)*40) + "%"
p.style.top = (50 + (Math.random()-0.5)*40) + "%"

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},1000)

}

}

window.onload = ()=>{
patlama()
}

</script>

</body>
</html>
